name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: "35"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.0"
  TZ: Etc/UTC

jobs:
  verify:
    name: Unit tests, lint, and builds
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        run: sdkmanager "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS_VERSION}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests, lint, and assemble APKs
        run: >-
          ./gradlew --no-daemon --stacktrace
          :app:testDebugUnitTest
          :app:lintDebug
          :app:assembleDebug
          :app:assembleRelease

  instrumented-tests:
    name: Instrumented tests (API 35)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        run: sdkmanager "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS_VERSION}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0660", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connected instrumented tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_2
          cores: 2
          force-avd-creation: true
          disable-animations: true
          disable-spellchecker: true
          emulator-boot-timeout: 1200
          emulator-options: >-
            -no-snapshot -no-window -gpu swiftshader_indirect -noaudio
            -no-boot-anim -camera-back none -camera-front none -timezone Etc/UTC
          script: ./gradlew --no-daemon --stacktrace :app:connectedDebugAndroidTest
